# Production stack, sized for a 2 vCPU / 4 GB RAM VPS (see
# docs/DEPLOYMENT.md for the full env var reference and bring-up steps).
#
# Differs from the dev docker-compose.yml in: TLS termination + HSTS +
# rate limiting at Nginx, no host-published DB port, per-container
# resource limits, a tuned Uvicorn worker count, and dedicated
# certbot/backup services. No paid third-party service is used anywhere
# in this file.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 768M
    # Deliberately no `ports:` — only reachable from other containers on
    # the compose network, never from the host/internet.

  backend:
    build:
      context: ./backend
    # 2 Uvicorn workers: this is a 2 vCPU box shared with Postgres and
    # Nginx, so we do not default to Uvicorn's `workers=auto` (one per
    # core), which would starve the other containers. Plain
    # multi-worker Uvicorn is used instead of adding a Gunicorn
    # dependency, per CLAUDE.md's simplicity principle.
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    environment:
      CORS_ALLOWED_ORIGINS: "https://${DOMAIN}"
      DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      FIELD_ENCRYPTION_SECRET: ${FIELD_ENCRYPTION_SECRET}
      SESSION_COOKIE_SECURE: "true"
      SESSION_COOKIE_SAMESITE: "strict"
      ENVIRONMENT: "production"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ""
    volumes:
      - frontend_dist:/shared
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    # Builds the static bundle once and exits (see frontend/Dockerfile) —
    # not a long-lived process, so this limit only applies briefly during
    # `docker compose up`, not to the steady-state resource budget.

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_completed_successfully
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro
      - ./nginx/prod/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/prod/templates:/etc/nginx/templates:ro
      - ./nginx/prod/certbot-www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./nginx/prod/certbot-www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Renewal loop only — initial issuance is a one-off bootstrap step
    # documented in docs/DEPLOYMENT.md (chicken-and-egg: Nginx's TLS
    # server block needs a certificate to exist before it will start).
    entrypoint: >
      sh -c "trap exit TERM; while :; do certbot renew --webroot -w
      /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

  backup:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGHOST: db
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: ["sh", "/backup.sh"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

volumes:
  frontend_dist:
  db_data:
  certbot_conf:
