services:
  db:
    image: postgres:16-alpine
    environment:
      # Dev-only credentials, never used outside local preview.
      POSTGRES_USER: cranes
      POSTGRES_PASSWORD: cranes_dev_password
      POSTGRES_DB: cranes_sizing
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cranes"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    environment:
      CORS_ALLOWED_ORIGINS: "http://localhost:8080"
      DATABASE_URL: "postgresql+psycopg://cranes:cranes_dev_password@db:5432/cranes_sizing"
      # Dev-only placeholders — override both for any real deployment.
      FIELD_ENCRYPTION_SECRET: "INSECURE-DEV-ONLY-CHANGE-ME"
      SESSION_COOKIE_SECURE: "false" # local preview is plain HTTP, not HTTPS
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ""
    volumes:
      - frontend_dist:/shared

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_completed_successfully
    ports:
      - "8080:80"
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  frontend_dist:
  db_data:
