# LAN-only Nginx config: plain HTTP, no TLS/certbot (see
# docs/NAS_DEPLOYMENT.md for why, and how to add TLS yourself via your
# NAS's own reverse proxy if you want it). Security headers and rate
# limiting are still applied — those don't require TLS to be useful.
#
# This file is a conf.d snippet mounted into the stock nginx:1.27-alpine
# image (unlike nginx/prod/, there is no custom main nginx.conf or
# ${DOMAIN} templating here — a NAS deployment has no public domain to
# template in).
server_tokens off;

limit_req_zone $binary_remote_addr zone=auth_rl:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=calc_rl:10m rate=60r/m;
limit_req_status 429;

server {
    listen 80;
    server_name _;

    # Re-resolve the backend container's IP through Docker's embedded DNS
    # on every request (cached 10s) instead of once at nginx startup.
    # Without this, recreating the backend container (every deploy) leaves
    # nginx proxying to the old container IP -> 502 on every /api call
    # until nginx itself is restarted. Using a variable in proxy_pass is
    # what forces the runtime lookup; the original request URI is passed
    # through unchanged, which matches the location prefixes below.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream backend:8000;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'none'; form-action 'self'" always;

    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header X-Frame-Options;
    proxy_hide_header Referrer-Policy;
    proxy_hide_header Content-Security-Policy;

    location /api/auth/ {
        limit_req zone=auth_rl burst=10 nodelay;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        limit_req zone=calc_rl burst=20 nodelay;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }
}
