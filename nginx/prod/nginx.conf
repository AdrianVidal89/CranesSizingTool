worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Reasonable ceiling for JSON calculation payloads; well above any
    # legitimate request, low enough to blunt trivial body-size abuse.
    client_max_body_size 1m;

    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent "$http_referer"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Never leak nginx version in error pages / Server header.
    server_tokens off;

    # Rate limiting (CLAUDE.md security checklist item 5): keyed by client
    # IP. /api/auth/* is strict (brute-force protection); /api/calc/* and
    # the rest of /api/* are more generous (abuse/DoS protection on the
    # calculation engine without blocking normal interactive use).
    limit_req_zone $binary_remote_addr zone=auth_rl:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=calc_rl:10m rate=60r/m;
    limit_req_status 429;

    include /etc/nginx/conf.d/*.conf;
}
